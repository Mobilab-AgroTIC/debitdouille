; Configuration PlatformIO pour Debitdouille V2
; Compatible avec l'IDE Arduino - ne modifie pas le code source

[platformio]
src_dir = .

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Configuration du moniteur série
monitor_speed = 115200

; Bibliothèques requises (PlatformIO les installera automatiquement)
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit ADS1X15@^2.5.0
    bblanchon/ArduinoJson@^7.2.1

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

; Configuration du moniteur série
monitor_speed = 115200

; Bibliothèques requises (PlatformIO les installera automatiquement)
lib_deps =
    mikalhart/TinyGPSPlus@^1.0.3
    adafruit/Adafruit ADS1X15@^2.5.0
    bblanchon/ArduinoJson@^7.2.1

; Options spécifiques XIAO ESP32-S3
; Décommentez si vous avez des problèmes d'upload:
; upload_speed = 115200

; Configuration du port série (décommentez et adaptez)
; upload_port = COM3      ; Pour Windows
; monitor_port = COM3
; upload_port = /dev/ttyACM0    ; Pour Linux
; monitor_port = /dev/ttyACM0

; Options de compilation
build_flags =
    -D CORE_DEBUG_LEVEL=0

; Configuration du port série
; Décommentez et modifiez selon votre système:
; upload_port = COM3      ; Pour Windows (adapter le numéro)
; monitor_port = COM3
; upload_port = /dev/ttyUSB0    ; Pour Linux
; monitor_port = /dev/ttyUSB0
